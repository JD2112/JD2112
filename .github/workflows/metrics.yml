name: Metrics
on:
  # Schedule updates (each 24h)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below allowed to run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: JD2112
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Stockholm
          config_order: introduction, base.header, isocalendar, languages, habits, followup, lines, achievements
          config_queries_cache: yes
          
          # Appearance
          config_display: large
          config_padding: 0, 8%
          
          # Plugins
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_habits_trim: yes
          
          # Introduction plugin
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          # Followup plugin (metrics like PRs, Issues)
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_details: percentage
          
          # Lines plugin
          plugin_lines: yes
          
          # Achievements plugin
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: no
          plugin_achievements_limit: 10
          
          # Themes
          config_theme: radical
          
          # Stable config refinements
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Resilience
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics [skip ci]"

name: Metrics
on:
  # Schedule updates (each 24h)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below allowed to run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: JD2112
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Stockholm
          
          # Appearance
          config_display: large
          config_padding: 0, 8%
          config_order: base.header, isocalendar, languages, habits, followup, lines
          
          # Plugins
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Habits plugin
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Followup plugin (metrics like PRs, Issues)
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          
          # Lines plugin
          plugin_lines: yes
          
          # Achievements plugin (eye-catching badges)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # Themes
          theme: radical
